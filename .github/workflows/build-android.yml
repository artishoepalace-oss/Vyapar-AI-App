name: Build Vyapar AI Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew :android-app:app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VyaparAI-debug-apk
          path: android-app/app/build/outputs/apk/debug/*.apk
